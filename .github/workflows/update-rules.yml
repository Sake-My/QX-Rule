name: Update Quantumult X rules

on:
  schedule:
    # 06:30 Asia/Hong_Kong every day.
    - cron: "30 22 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/update-rules.yml"
      - "scripts/convert-loyalsoldier-to-qx.mjs"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Convert Loyalsoldier rules
        run: node scripts/convert-loyalsoldier-to-qx.mjs
        env:
          QX_PROXY_POLICY: proxy
          QX_DIRECT_POLICY: direct
          QX_REJECT_POLICY: reject

      - name: Publish rules to release branch
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          cp -R ruleset "$tmp_dir/ruleset"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin release || true
          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git checkout -B release origin/release
          else
            git checkout --orphan release
          fi
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$tmp_dir/ruleset" ./ruleset
          git add -A
          if git diff --cached --quiet; then
            echo "No rule changes."
          else
            git commit -m "chore: update Quantumult X rules"
            git push origin release
          fi
